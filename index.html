<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DAMAR SPAM - تسجيل الدخول</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#000;
      color:#fff;
      font-family:system-ui, sans-serif;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }
    .card {
      background:#0a0a0a;
      border:1px solid #00ff9d30;
      border-radius:16px;
      padding:32px 24px;
      width:100%;
      max-width:420px;
      text-align:center;
      box-shadow:0 0 40px #00ff9d15;
    }
    h1 {
      color:#00ff9d;
      font-size:2.6rem;
      margin-bottom:8px;
      text-shadow:0 0 20px #00ff9d80;
      letter-spacing:1px;
    }
    .team {
      color:#00ff9d;
      font-size:1.1rem;
      margin-bottom:32px;
      opacity:0.9;
    }
    input {
      width:100%;
      padding:16px;
      margin:16px 0;
      background:#111;
      border:1px solid #333;
      border-radius:8px;
      color:#fff;
      font-size:1.1rem;
    }
    input:focus {
      outline:none;
      border-color:#00ff9d;
      box-shadow:0 0 0 3px #00ff9d20;
    }
    button {
      width:100%;
      padding:16px;
      background:#00ff9d;
      color:#000;
      font-size:1.25rem;
      font-weight:700;
      border:none;
      border-radius:8px;
      cursor:pointer;
      margin:16px 0 8px;
      transition:0.2s;
    }
    button:hover { background:#00e676; }
    .error {
      background:rgba(239,68,68,0.15);
      color:#ef4444;
      padding:12px;
      border-radius:8px;
      margin:16px 0;
      border-right:4px solid #ef4444;
      display:none;
    }
    .footer {
      margin-top:24px;
      color:#555;
      font-size:0.9rem;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>DAMAR SPAM</h1>
  <div class="team">DAMAR SPAM TEAM</div>

  <form id="loginForm">
    <input type="text" name="username" placeholder="اسم المستخدم" required autocomplete="off" />
    <input type="password" name="password" placeholder="كلمة المرور" required autocomplete="off" />
    <button type="submit">تسجيل الدخول</button>
  </form>

  <div class="error" id="errorMsg"></div>

  <div class="footer">
    جميع الحقوق محفوظة - DAMAR SPAM 2026 ©
  </div>
</div>

<script>
  // يوزرز ثابتة (مؤقتاً)
  const users = {
    "ADHAM111": "KAREM111",
    // أضف المزيد هنا إذا أردت
  };

  document.getElementById("loginForm").addEventListener("submit", e => {
    e.preventDefault();

    const u = document.querySelector('[name="username"]').value.trim();
    const p = document.querySelector('[name="password"]').value.trim();
    const err = document.getElementById("errorMsg");

    if (users[u] === p) {
      localStorage.setItem("loggedIn", "true");
      localStorage.setItem("user", u);

      if (u === "ADHAM111") {
        location.href = "admin.html";
      } else {
        location.href = "spam.html";
      }
    } else {
      err.textContent = "اسم المستخدم أو كلمة المرور غير صحيحة";
      err.style.display = "block";
    }
  });
</script>

</body>
</html>
