<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DAMAR SPAM</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #000;
      color: #e0f7fa;
      margin: 0;
      padding: 20px 10px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .card {
      background: #0a0a0a;
      border: 1px solid #00ff9d30;
      border-radius: 16px;
      padding: 32px 24px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 0 40px #00ff9d15;
      text-align: center;
    }
    h1 {
      color: #00ff9d;
      font-size: 2.6rem;
      margin: 0 0 32px;
      text-shadow: 0 0 20px #00ff9d80;
    }
    label {
      display: block;
      font-size: 1.1rem;
      margin: 16px 0 8px;
      color: #80deea;
    }
    input {
      width: 100%;
      padding: 16px;
      margin: 8px 0 16px;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 1.1rem;
    }
    input:focus {
      border-color: #00ff9d;
      box-shadow: 0 0 0 3px #00ff9d20;
      outline: none;
    }
    .btn-row {
      display: flex;
      gap: 16px;
      margin: 32px 0;
    }
    button {
      flex: 1;
      padding: 16px;
      font-size: 1.2rem;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
    }
    .start { background: #00ff9d; color: #000; }
    .stop  { background: #ef4444; color: #fff; }
    button:hover { opacity: 0.92; }
    #msg {
      min-height: 24px;
      font-weight: bold;
      margin-top: 16px;
    }
    .success { color: #22c55e; }
    .error   { color: #ef4444; }
  </style>
</head>
<body>

<div class="card">
  <h1>DAMAR SPAM</h1>

  <label>TARGET UID</label>
  <input type="text" id="uid" placeholder="أدخل UID الهدف" />

  <label>المدة (بالدقائق)</label>
  <input type="number" id="duration" value="30" min="1" max="1440" />

  <div class="btn-row">
    <button class="start" onclick="start()">START SPAM</button>
    <button class="stop"  onclick="stop()">STOP SPAM</button>
  </div>

  <div id="msg"></div>
</div>

<script>
  if (!localStorage.getItem('loggedIn')) {
    alert('يرجى تسجيل الدخول أولاً');
    location.href = 'index.html';
  }

  const msgEl = document.getElementById('msg');

  function show(t, c='') {
    msgEl.textContent = t;
    msgEl.className = c;
  }

  async function start() {
    const uid = document.getElementById('uid').value.trim();
    const dur = document.getElementById('duration').value;

    if (!uid) return show('أدخل UID أولاً', 'error');
    if (!dur || dur < 1) return show('أدخل مدة صحيحة', 'error');

    show('جاري التشغيل...', 'success');

    // ← هنا ضع الكود الفعلي للـ API الخاص بك
    try {
      // مثال:
      // await fetch('http://38.190.133.136:25567/spam?user_id='+uid+'&duration='+dur);
      show(`تم تشغيل السبام على ${uid} لمدة ${dur} دقيقة`, 'success');
    } catch(e) {
      show('حدث خطأ', 'error');
    }
  }

  async function stop() {
    const uid = document.getElementById('uid').value.trim();
    if (!uid) return show('أدخل UID أولاً', 'error');

    show('جاري الإيقاف...', 'success');

    try {
      // await fetch('http://38.190.133.136:25567/stop?user_id='+uid);
      show(`تم إيقاف السبام على ${uid}`, 'success');
    } catch(e) {
      show('حدث خطأ', 'error');
    }
  }
</script>

</body>
</html>
